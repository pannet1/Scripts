# =============================================================================
# tmux.conf — Tmux configuration for agentic development workflow
# Load defaults first, then our overrides and plugins
# =============================================================================
source-file ~/.config/tmux/tmux.reset.conf

# =============================================================================
# TERMINAL
# =============================================================================
set -g default-terminal 'tmux-256color'
set -g terminal-overrides ',xterm-256color:RGB'

# =============================================================================
# GENERAL
# =============================================================================
set -g base-index 1              # window numbers start at 1
set -g detach-on-destroy off     # don't kill session when last window closes
set -g escape-time 0             # no delay after Escape (vim users)
set -g history-limit 1000000     # scrollback buffer
set -g renumber-windows on       # auto-renumber when closing windows
set -g set-clipboard on          # sync with system clipboard
setw -g mode-keys vi             # vi-style copy mode

# Window navigation with wrap (cycle from last→first and first→last)
bind n if-shell -F '#{==:#{window_index},#{session_windows}}' 'select-window -t :1' 'next-window'

# Override plugin defaults to lowercase (avoid Shift chords)
set-environment -g TMUX_FZF_LAUNCH_KEY f

# Clean tmux-fzf display formats (no multi-select markers, clear session:window)
set-environment -g TMUX_FZF_OPTIONS "-p -w 62% -h 38%"
set-environment -g TMUX_FZF_SESSION_FORMAT "#{session_windows} windows#{?session_attached, (attached),}"
set-environment -g TMUX_FZF_WINDOW_FORMAT "#{window_name}#{?window_active,*,}"
set-environment -g TMUX_FZF_PANE_FORMAT "[#{window_name}] #{pane_current_command}"

# =============================================================================
# PANE BORDERS
# =============================================================================
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# =============================================================================
# PLUGINS (via TPM)
# =============================================================================
# Plugin list — install with: prefix+I
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'         # system clipboard integration
set -g @plugin 'christoomey/vim-tmux-navigator'  # ctrl-hjkl between nvim+tmux
set -g @plugin 'fcsonline/tmux-thumbs'           # fuzzy text selection
set -g @plugin 'sainnhe/tmux-fzf'                # fzf session/window switcher
set -g @plugin 'wfxr/tmux-fzf-url'               # fzf open URLs in pane
set -g @plugin 'omerxx/catppuccin-tmux'           # theme
set -g @plugin 'omerxx/tmux-floax'               # floating/popup terminal
set -g @plugin 'tmux-plugins/tmux-battery'       # battery status

# ── fzf-url ─────────────────────────────────────────────────────────────────
# Modified from: https://github.com/wfxr/tmux-fzf-url
# Captures URLs in pane output, opens with fzf
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ── floax (popup terminal) ──────────────────────────────────────────────────
# Use case: quick commands without leaving Neovim
#   prefix+p → opens popup in current directory
#   prefix+p again → close popup
#   Great for: git commands, :Orch calls, file operations
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'                     # prefix+p to toggle
set -g @floax-change-path 'true'           # popup in pane's CWD

# ── continuum & resurrect ───────────────────────────────────────────────────
# Modified from: https://github.com/tmux-plugins/tmux-continuum
# Auto-saves session layout every 5 minutes; restores on restart.
# Never lose your window/pane layout between reboots.
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'  # saves nvim session state too

# ── catppuccin theme ─────────────────────────────────────────────────────────
# Modified from: https://github.com/omerxx/catppuccin-tmux
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator ", "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "none"
set -g @catppuccin_window_default_text "#{pane_current_command}(#{window_index})"
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_window_current_text "#{pane_current_command}(#{window_index})"
set -g @catppuccin_status_modules_right "date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
set -g @catppuccin_date_time_text "%H:%M"

# ── battery ─────────────────────────────────────────────────────────────────
set -g status-right 'Colors: #{battery_color_bg}bg#[default] #{battery_color_fg}fg#[default] #{battery_color_charge_bg}charge_bg#[default] #{battery_color_charge_fg}charge_fg#[default] #{battery_color_status_bg}status_bg#[default] #{battery_color_status_fg}status_fg#[default] | Graph: #{battery_graph} | Icon: #{battery_icon} | Charge Icon: #{battery_icon_charge} | Status Icon: #{battery_icon_status} | Percent: #{battery_percentage} | Remain: #{battery_remain}'
set -g status-right-length '150'

# =============================================================================
# SESSIONIZER — fzf-based project switcher
# =============================================================================
# Binds: prefix+o → fzf sessionizer popup
# Use case: fuzzy-search projects → switch to existing session or create new one
# Scans ~/projects and any dirs in $SESSIONIZER_ROOTS
bind o run "tmux popup -E -w90% -h80% \"$HOME/.config/tmux/scripts/sessionizer.sh\""

# =============================================================================
# CHEATSHEET — curated keybinding reference
# =============================================================================
# Binds: prefix+/ → curated cheatsheet popup
# Shows categorized custom/important bindings (excludes rarely-used defaults)
bind / run "tmux popup -E -w70% -h70% \"$HOME/.config/tmux/scripts/cheatsheet.sh | less -X\""

# =============================================================================
# BOOTSTRAP
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
