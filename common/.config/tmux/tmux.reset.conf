# =============================================================================
# tmux.reset.conf — Core keybindings (tmux default reset + custom)
# Sourced first, then overridden by tmux.conf
# =============================================================================

# ── Session / Window Management ─────────────────────────────────────────────
bind ^X         lock-server            # Ctrl-X        lock session
bind ^C         new-window -c "$HOME"   # Ctrl-C        create new window
bind ^D         detach                  # Ctrl-D        detach from session
bind ^A         last-window             # Ctrl-A        go to last window
bind ^W         list-windows            # Ctrl-W        list windows (like C-w in shell)
bind w          list-windows            # w             list windows
bind '"'        choose-window           # "             interactive window picker
bind S          choose-session          # S             interactive session picker
bind *          list-clients            # *             list attached clients
bind H          previous-window         # H             previous window
bind L          next-window             # L             next window
bind r          command-prompt "rename-window %%"
bind R          source-file ~/.config/tmux/tmux.conf  # reload config
bind c          kill-pane               # C             kill current pane
bind x          swap-pane -D            # X             swap pane down

# ── Pane Splitting ──────────────────────────────────────────────────────────
# Visual mnemonic: | (vertical line) = left/right split
#                   - (horizontal line) = top/bottom split
bind |          split-window -h -c "#{pane_current_path}" # |   split left/right
bind -          split-window -v -c "#{pane_current_path}" # -   split top/bottom
bind s          split-window -v -c "#{pane_current_path}" # s   split vertical (alt)
bind v          split-window -h -c "#{pane_current_path}" # v   split horizontal (alt)

# ── Pane Navigation (hjkl) ──────────────────────────────────────────────────
bind h          select-pane -L     # h      left pane
bind j          select-pane -D     # j      down pane
bind k          select-pane -U     # k      up pane
bind l          select-pane -R     # l      right pane

# ── Pane Resizing (prefix + , . _ =) ────────────────────────────────────────
bind -r -T prefix ,   resize-pane -L 20   # ,    grow left
bind -r -T prefix .   resize-pane -R 20   # .    grow right
bind -r -T prefix _   resize-pane -D 7    # _    grow down
bind -r -T prefix =   resize-pane -U 7    # =    grow up

# ── Layout / View ───────────────────────────────────────────────────────────
bind z          resize-pane -Z         # Z     toggle pane zoom
bind P          set pane-border-status # P     toggle pane borders

# ── Misc ────────────────────────────────────────────────────────────────────
bind :          command-prompt         # :     enter command
bind *          setw synchronize-panes  # *    toggle synchronized input
bind K          send-keys "clear"\; send-keys "Enter"  # K  clear pane
bind ^L         refresh-client         # Ctrl-L        redraw
bind l          refresh-client         # L             redraw

# copy-mode: v to begin selection (vi-style)
bind-key -T copy-mode-vi v send-keys -X begin-selection
