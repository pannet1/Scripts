# --- General Options ---
set -g mouse on
set -g default-terminal "xterm-kitty"
# Add this to fix the RGB colors specifically for Kitty
set -as terminal-overrides ',xterm-kitty:RGB'

#####################
## Global Settings ##
#####################
set-option -g prefix C-b                                                                            # change default prefix to ctrl+p
set-option -g mode-keys vi                                                                          # use vi mode/keys
set-option -g status-keys vi                                                                        # use vi mode/keys
set-option -g mouse on                                                                              # enable mouse support
set-option -g history-limit 15000                                                                   # increase history limit
set-option -g repeat-time 2000                                                                      # allow multiple commands to be entered without pressing prefix again
set-option -g detach-on-destroy off                                                                 # switch to most recently active session when session is destroyed
set-option -g display-time 2000                                                                     # amount of time status line messages are displayed
set-option -g display-panes-time 4000                                                               # amount of time indicators are shown by display-panes command
set-option -g set-titles on                                                                         # set client terminal title
set-option -g set-titles-string '#T'                                                                # string used to set above client terminal title
set-option -sg escape-time 0                                                                        # speed up vim mode transitions
set-option -g focus-events on

###########
# Windows #
###########
set-window-option -g aggressive-resize on                           # when I use a second, grouped session, allow the windows to be resized individually
set-window-option -g alternate-screen off                           # disable screen restoration on exit from vi, less, etc
set-option -g base-index 1                                          # start windows numbering from 1
set-window-option -g pane-base-index 1                              # like above, but for pane numbers
set-option -g renumber-windows on                                   # renumber windows when they're swapped
set-window-option -g automatic-rename on                            # rename window to reflect current program
set-window-option -g word-separators ' ()":,;<>~!@#$%^&*|+=[]{}?'   # word separators when in copy mode
set-window-option -ag word-separators "'"                           # adding to above word separators
set-window-option -g monitor-activity on                            # monitor for activity in windows
set-option -g visual-activity off                                   # disable visual bell
set-window-option -g window-status-activity-style none              # disable activity styling (let catppuccin handle it)

##################
## Key bindings ##
##################
bind-key p send-prefix                                      # send prefix key
bind-key C-p last-window                                    # go to previous window
bind-key -r h select-pane -L                                # move left
bind-key -r j select-pane -D                                # move down
bind-key -r k select-pane -U                                # move up
bind-key -r l select-pane -R                                # move right
bind-key -n C-Left select-window -t -1                      # select left window
bind-key -n C-Right select-window -t +1                     # select right window
bind-key -n C-S-Left swap-window -d -t -1                   # move window left
bind-key -n C-S-Right swap-window -d -t +1                  # move window right
bind-key s choose-tree -sZ -O name                          # order session tree by name
bind-key - split-window -v                                  # split current window horizontally
bind-key _ split-window -h                                  # split current window vertically
bind-key -N "Go to host" \
    g command-prompt -p "Go to:" "run-shell 'exec g %%'"
bind-key -N "Go to multiple hosts" \
    G command-prompt -p "Multi go to:" "run-shell 'exec multi_tmux %%'"
bind-key -N "Synchronize panes" \
    '\' {
            set synchronize-panes
            display-message 'Synchronisation -> #{?pane_synchronized,enabled,disabled}'
        }
bind-key -N "Choose a window" \
    '"' choose-tree -ZN -F '#{window_panes} #{window_flags} #{?pane_dead,[dead] ,}#{pane_title} - #{window_name}'
bind-key -N "Kill pane" \
    K confirm-before -p "kill-pane #P? (y/n)" kill-pane

############
## Search ##
############
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""      # incremental forward search
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""       # incremental backward search

##########
## Copy ##
##########
bind Enter copy-mode                                        # enter copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

########################
## Logging and Saving ##
########################
bind-key M-s command-prompt -p "Save this pane history to: " "capture-pane -b temp-capture-buffer -J -S- \; save-buffer -b temp-capture-buffer %% \; delete-buffer -b temp-capture-buffer"      # save contents of pane to file

#############
## Plugins ##
#############
# tpm (https://github.com/tmux-plugins/tpm)
set -g @plugin 'tmux-plugins/tpm'

# tmux-fuzzback (https://github.com/roosta/tmux-fuzzback)
set -g @plugin 'roosta/tmux-fuzzback'
run-shell ~/.tmux/plugins/tmux-fuzzback/fuzzback.tmux
set -g @fuzzback-popup 1

# catppuccin theme (https://github.com/catppuccin/tmux)
set -g @plugin 'catppuccin/tmux#v2.0.0'
set -g @catppuccin_flavor 'mocha'
## window settings
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
## pane settings
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_red},fg=#{@thm_blue}}}"
## status settings
set -g status-left ""
set -g status-right ""
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g @catppuccin_status_background "#000000"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator " "

# Run TPM (always have this last in the configuration)
run '~/.tmux/plugins/tpm/tpm'


set -g extended-keys on
