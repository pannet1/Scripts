# ─────────────────────────────────────────────────────────────
# Self-Hosted Private AI Stack
# Services: llama-swap (engine), anythingllm (chat/rag), n8n (automation)
# Network: ai-net (internal only, no external routing)
# ─────────────────────────────────────────────────────────────

services:

  # ── Chat UI + RAG ─────────────────────────────────────────
  anythingllm:
    image: ${ANYTHINGLLM_IMAGE:-mintplexlabs/anythingllm:latest}
    container_name: anythingllm
    ports:
      - "${ANYTHINGLLM_PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${DATA_DIR:-./data}/anythingllm:/app/server/storage
      - ${DATA_DIR:-./data}/lancedb:/app/lancedb
      - ${DOCUMENTS_DIR:-./documents}:/documents:ro
    environment:
      - SERVER_PORT=3001
      - STORAGE_DIR=/app/server/storage


      # LLM provider → local OpenAI-compatible via host llama-swap
      - LLM_PROVIDER=generic-openai
      - GENERIC_OPEN_AI_BASE_PATH=http://host.docker.internal:${LLAMA_SWAP_PORT:-8080}/v1
      - GENERIC_OPEN_AI_MODEL_PREF=qwen2.5-7b-instruct
      - GENERIC_OPEN_AI_API_KEY=${LLAMA_SWAP_API_KEY:-sk-local-dummy}

      # Embedding provider → same local endpoint (generic-openai skips key validation)
      - EMBEDDING_ENGINE=generic-openai
      - EMBEDDING_BASE_PATH=http://host.docker.internal:${LLAMA_SWAP_PORT:-8080}/v1
      - EMBEDDING_MODEL_PREF=nomic-embed-text
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=512

      # Vector database → LanceDB (embedded)
      - VECTOR_DB=lancedb
      - LANCEDB_URI=/app/lancedb

      # Local Whisper & TTS
      - WHISPER_PROVIDER=local
      - TTS_PROVIDER=native

      # Security
      - DISABLE_TELEMETRY=true
      - PASSWORDMINCHAR=8
      # Single-user mode — no AUTH_TOKEN needed
      # - AUTH_TOKEN=${ANYTHINGLLM_API_KEY:-sk-anythingllm-local-dev}
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-net

  # ── Automation ────────────────────────────────────────────
  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    container_name: n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - ${DATA_DIR:-./data}/n8n:/home/node/.n8n
      - ${CONFIG_DIR:-./config}/n8n:/workflows:ro
    environment:
      - N8N_PORT=5678
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      - N8N_CONFIG_FILES=/workflows
      - N8N_METRICS=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - WEBHOOK_URL=http://localhost:${N8N_PORT:-5678}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-net

networks:
  ai-net:
    name: ai-net
    driver: bridge
    internal: false
