# Local-only pre-commit hooks (no network)
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: syntax-check
        name: Syntax Check
        language: system
        entry: bash -c 'uv run python -m py_compile src/*.py'
        types: [python]
        pass_filenames: false
        always_run: true

      - id: lint-check
        name: Lint Check
        language: system
        entry: bash -c 'cd . && uv run ruff check --fix src/'
        types: [python]
        pass_filenames: false
        always_run: false

      - id: test-check
        name: Run Tests
        language: system
        entry: bash -c 'cd . && uv run pytest tests/ -v --tb=short'
        always_run: false